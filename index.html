<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 14 Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar">
<div class="mode-toggle">
<span class="mode-label">Dark Mode</span>
<label class="switch">
<input type="checkbox" id="dark-mode-toggle">
<span class="slider"></span>
</label>
</div>
</div>
<div class="main-layout">
<section class="column">
<div class="neumo-card">
<table id="rankings-table">
<thead>
<tr>
<th>Pos</th>
<th style="text-align: left;">Équipe</th>
<th>Pts</th>
</tr>
</thead>
<tbody id="rankings-body"></tbody>
</table>
</div>
</section>
<section class="column">
<div class="nav-container">
<button id="prev-btn" class="neumo-btn">←</button>
<div id="round-label" class="neumo-inset">Journée --</div>
<button id="next-btn" class="neumo-btn">→</button>
</div>
<div class="neumo-card" id="matches-section">
<div id="matches-list"></div>
</div>
</section>
</div>
<script src="script.js" defer></script>
</body>
</html>
